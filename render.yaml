# Deploy backend API on Render (free tier): https://render.com
# PDFs & enquiries are stored on the server disk under backend/data/
services:
  - type: web
    name: malkar-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      # RENDER_EXTERNAL_URL is set automatically; used for PDF/map links in API responses
